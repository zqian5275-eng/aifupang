<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>生活狼狈时刻 · AI花哥</title>
<style>
:root{--bg:#050507;--card:#101010;--border:#3d3a39;--green:#00d992;--rose:#fb7185;--text:#f2f2f2;--text2:#b8b3b0;--text3:#8b949e;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(30,41,59,.3)1px,transparent 1px),linear-gradient(90deg,rgba(30,41,59,.3)1px,transparent 1px);background-size:60px 60px}
header{position:sticky;top:0;z-index:100;background:rgba(5,5,7,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
.h-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-size:18px;font-weight:700;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 6px rgba(0,217,146,.3)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.nav a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500}
.nav a:hover{color:var(--green)}

.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:20px}

/* Category tabs */
.cats{display:flex;gap:8px;overflow-x:auto;padding:4px 0 16px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{padding:6px 16px;border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:transparent;transition:all .2s;font-family:inherit}
.cat:hover,.cat.active{border-color:var(--rose);color:var(--rose);background:rgba(251,113,133,.08)}

/* Story cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:all .2s;cursor:pointer}
.card:hover{border-color:rgba(255,255,255,.08)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.avatar img{width:100%;height:100%;border-radius:50%}
.user-info{flex:1}
.nickname{font-size:14px;font-weight:600}
.time-tag{font-size:11px;color:var(--text3)}
.cat-tag{padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(251,113,133,.1);color:var(--rose);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.content{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.actions{display:flex;gap:20px;font-size:13px;color:var(--text3)}
.action{display:flex;align-items:center;gap:4px}
.action.liked{color:var(--rose)}
.read-more{color:var(--rose);font-size:12px;margin-top:4px;display:inline-block;text-decoration:none}
.read-more:hover{text-decoration:underline}

/* Detail modal */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:12px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:24px}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer}
.modal-close:hover{color:var(--rose)}
.modal .content{-webkit-line-clamp:unset;overflow:visible}
.comment{background:rgba(255,255,255,.02);border-radius:6px;padding:12px;margin-bottom:8px}
.comment .c-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.comment .c-nick{font-size:13px;font-weight:600}
.comment .c-time{font-size:11px;color:var(--text3)}
.comment .c-content{font-size:13px;color:var(--text2);line-height:1.6}
.comment .c-likes{font-size:11px;color:var(--text3);margin-top:4px}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
footer{position:relative;z-index:1;text-align:center;padding:30px;border-top:1px solid var(--border);color:var(--text3);font-size:11px;margin-top:40px}
</style>

{id:3,nickname:"通勤倒霉蛋",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=user3",content:"早上坐地铁，手机掉进了站台和轨道之间的缝隙里。工作人员花了半小时才帮我捞上来，结果手机屏幕朝下摔碎了。迟到了不说，手机还报废了，今天真的太倒霉了",category:"通勤",categoryKey:"commute",time:"昨天",likes:342,comments:56,reads:890,isLiked:false,votes:{resonance:234,compete:67,laugh:156},commentsList:[{id:301,nickname:"AI",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=ai2",content:"救命啊这也太社死了！求后续！",time:"昨天",likes:78},{id:302,nickname:"地铁常客",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c6",content:"太惨了，抱抱",time:"昨天",likes:78},{id:303,nickname:"手机杀手",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c7",content:"我也掉过，不过运气好没碎",time:"昨天",likes:56}]},

{id:4,nickname:"职场小白",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=user4",content:"开会的时候太紧张，把老板叫成了爸爸...整个会议室瞬间安静了，我当时恨不得找个地缝钻进去。现在每次见到老板都觉得尴尬到不行",category:"工作",categoryKey:"work",time:"2天前",likes:567,comments:89,reads:1234,isLiked:false,votes:{resonance:345,compete:123,laugh:456},commentsList:[{id:401,nickname:"社畜本人",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c8",content:"哈哈哈哈笑死我了",time:"2天前",likes:123},{id:402,nickname:"老板本板",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c9",content:"儿子，明天来我办公室一趟",time:"2天前",likes:234}]},

{id:5,nickname:"深夜崩溃",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=user5",content:"半夜两点突然想吃泡面，烧好水发现家里没有泡面了。穿睡衣下楼去便利店，结果遇到前女友挽着新男友...我穿着海绵宝宝睡衣，头发乱成鸟窝，手里还攥着五块钱",category:"生活",categoryKey:"life",time:"3天前",likes:890,comments:134,reads:2345,isLiked:false,votes:{resonance:567,compete:234,laugh:678},commentsList:[{id:501,nickname:"睡衣收藏家",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c10",content:"海绵宝宝睡衣哪里买的？",time:"3天前",likes:345},{id:502,nickname:"前任克星",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c11",content:"这比任何一本小说都精彩",time:"3天前",likes:234}]},

{id:6,nickname:"恐怖室友",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=user6",content:"半夜起来上厕所，没开灯，隐约看到客厅沙发上坐着一个人。我吓得差点尿裤子，结果是室友在敷面膜...黑色的那种。那个画面我可能一辈子都忘不了",category:"恐怖",categoryKey:"horror",time:"4天前",likes:456,comments:78,reads:1800,isLiked:false,votes:{resonance:234,compete:89,laugh:345},commentsList:[{id:601,nickname:"面膜达人",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c12",content:"黑色面膜真的很吓人哈哈哈",time:"4天前",likes:123}]},

{id:7,nickname:"告白翻车",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=user7",content:"暗恋了半年的女生终于答应和我一起去看电影。我精心准备了告白词，结果电影院太黑，我把爆米花桶当成了她的手，握了整整半小时...散场灯亮的时候，我们俩都愣住了",category:"恋爱",categoryKey:"love",time:"5天前",likes:1023,comments:200,reads:4500,isLiked:false,votes:{resonance:678,compete:345,laugh:890},commentsList:[{id:701,nickname:"爆米花本花",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c13",content:"散场后在一起了吗？在线等",time:"5天前",likes:567},{id:702,nickname:"电影院常客",avatar:"https://api.dicebear.com/7.x/avataaars/svg?seed=c14",content:"哈哈哈哈握爆米花也太好笑了",time:"5天前",likes:456}]}
];

const CATS = [
{key:'all',name:'全部'},{key:'commute',name:'通勤'},{key:'food',name:'外卖'},
{key:'social',name:'社交'},{key:'work',name:'工作'},{key:'life',name:'生活'},
{key:'horror',name:'恐怖'},{key:'love',name:'恋爱'}
];

let currentCat='all';

function renderCats(){
document.getElementById('cats').innerHTML=CATS.map(c=>
`<button class="cat${c.key===currentCat?' active':''}" onclick="filter('${c.key}')">${c.name}</button>`
).join('');
}

function filter(key){currentCat=key;renderCats();renderFeed();}

function renderFeed(){
const filtered=currentCat==='all'?STORIES:STORIES.filter(s=>s.categoryKey===currentCat);
document.getElementById('feed').innerHTML=filtered.length?filtered.map(s=>`
<div class="card" onclick="showDetail(${s.id})">
<div class="card-header">
<div class="avatar"><img src="${s.avatar}" onerror="this.parentElement.textContent='😄'"></div>
<div class="user-info"><div class="nickname">${s.nickname}</div><div class="time-tag">${s.time}</div></div>
<span class="cat-tag">${s.category}</span>
</div>
<div class="content">${s.content}</div>
<div class="actions">
<span class="action${s.isLiked?' liked':''}">${s.isLiked?'❤️':'🤍'} ${s.likes}</span>
<span class="action">💬 ${s.comments}</span>
<span class="action">👁 ${s.reads}</span>
</div>
</div>`).join(''):'<div class="empty">暂无故事</div>';
}

function showDetail(id){
const s=STORIES.find(x=>x.id===id);if(!s)return;
const comments=(s.commentsList||[]).map(c=>`
<div class="comment">
<div class="c-header"><span class="c-nick">${c.nickname}</span><span class="c-time">${c.time}</span></div>
<div class="c-content">${c.content}</div>
<div class="c-likes">❤️ ${c.likes}</div>
</div>`).join('');

document.getElementById('modalContent').innerHTML=`
<button class="modal-close" onclick="closeModal()">✕</button>
<div class="card-header" style="margin-top:8px">
<div class="avatar"><img src="${s.avatar}" onerror="this.parentElement.textContent='😄'"></div>
<div class="user-info"><div class="nickname">${s.nickname}</div><div class="time-tag">${s.time}</div></div>
<span class="cat-tag">${s.category}</span>
</div>
<div class="content" style="-webkit-line-clamp:unset;overflow:visible">${s.content}</div>
<div class="actions" style="margin-bottom:16px">
<span class="action${s.isLiked?' liked':''}">${s.isLiked?'❤️':'🤍'} ${s.likes}</span>
<span class="action">💬 ${s.comments}</span>
<span class="action">👁 ${s.reads}</span>
</div>
<div style="border-top:1px solid var(--border);padding-top:12px">
<div style="font-size:14px;color:var(--text2);margin-bottom:10px">💬 评论 (${comments?comments.split('class=\"comment\"').length-1:0})</div>
${comments||'<div style="color:var(--text3);font-size:13px">暂无评论</div>'}
</div>`;
document.getElementById('modal').style.display='flex';
}

function closeModal(){document.getElementById('modal').style.display='none';}

renderCats();renderFeed();
</script>
</body>
