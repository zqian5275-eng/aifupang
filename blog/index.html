*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(30,41,59,.3)1px,transparent 1px),linear-gradient(90deg,rgba(30,41,59,.3)1px,transparent 1px);background-size:60px 60px}
header{position:sticky;top:0;z-index:100;background:rgba(5,5,7,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-size:20px;font-weight:700;color:var(--green);text-decoration:none;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;box-shadow:0 0 8px rgba(0,217,146,.3)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.back-link{color:var(--text2);text-decoration:none;font-size:14px}.back-link:hover{color:var(--green)}

.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:40px 20px}
h1{font-size:32px;font-weight:400;margin-bottom:8px;letter-spacing:-.5px}
h1 .hl{color:var(--purple)}
.sub{font-size:14px;color:var(--text3);margin-bottom:40px}

.article{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px;text-decoration:none;color:var(--text);display:block;transition:all .3s}
.article:hover{border-color:rgba(255,255,255,.1);box-shadow:0 0 20px rgba(0,0,0,.4);transform:translateY(-1px)}
.article .date{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:8px}
.article h3{font-size:18px;font-weight:600;margin-bottom:6px}
.article p{font-size:13px;color:var(--text2);line-height:1.6}
.article .tag{display:inline-block;margin-top:8px;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'JetBrains Mono',monospace;background:rgba(167,139,250,.12);color:var(--purple)}

.article-page{max-width:800px;line-height:1.8;font-size:15px}
.article-page h2{font-size:22px;margin:32px 0 12px;color:var(--text)}
.article-page p{margin-bottom:16px;color:var(--text2)}
.article-page .meta{font-size:12px;color:var(--text3);margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}

footer{position:relative;z-index:1;text-align:center;padding:40px 20px;border-top:1px solid var(--border);color:var(--text3);font-size:12px;margin-top:60px}
</style>
